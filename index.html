<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Uniting Hearts - Baháʼí Dating & Matchmaking Community</title>
    <meta name="description" content="Find meaningful connections in the Baháʼí community. Uniting Hearts helps Baháʼí singles meet like-minded individuals who share values of unity, equality, and spiritual growth." />
    <meta name="author" content="Uniting Hearts" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2a9d8f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Uniting Hearts" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta property="og:title" content="Uniting Hearts - Baháʼí Dating & Matchmaking" />
    <meta property="og:description" content="Connect with Baháʼí singles seeking meaningful relationships based on shared values and spiritual growth." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@UnityHearts" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <style>
      body {
        margin: 0;
        background: #f5f1e8;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f5f1e8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #2a9d8f;
        z-index: 9999;
      }
      #initial-loader .heart {
        width: 48px;
        height: 48px;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #initial-loader p {
        margin: 0;
        font-size: 14px;
        color: #6b6b6b;
        letter-spacing: 0.02em;
      }
      #initial-loader .loader-recovery {
        display: none;
        width: min(360px, calc(100vw - 40px));
        margin-top: 8px;
        padding: 16px;
        border: 1px solid rgba(42, 157, 143, 0.22);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 18px 45px rgba(38, 70, 83, 0.12);
        text-align: center;
      }
      #initial-loader.loader-stalled .loader-recovery {
        display: block;
      }
      #initial-loader .loader-recovery strong {
        display: block;
        margin-bottom: 6px;
        color: #264653;
        font-size: 15px;
      }
      #initial-loader .loader-recovery span {
        display: block;
        color: #6b6b6b;
        font-size: 13px;
        line-height: 1.45;
      }
      #initial-loader .loader-actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 14px;
      }
      #initial-loader .loader-actions button,
      #initial-loader .loader-actions a {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #2a9d8f;
        color: #ffffff;
        font: inherit;
        font-size: 13px;
        text-decoration: none;
        cursor: pointer;
      }
      #initial-loader .loader-actions a {
        background: #ffffff;
        color: #264653;
        box-shadow: inset 0 0 0 1px rgba(38, 70, 83, 0.16);
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.7; }
      }
    </style>
    <div id="root">
      <div id="initial-loader">
        <svg class="heart" viewBox="0 0 24 24" fill="#2a9d8f" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21s-7-4.35-7-10a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.65-7 10-7 10z"/>
        </svg>
        <p>Loading Uniting Hearts…</p>
        <div class="loader-recovery" role="status" aria-live="polite">
          <strong>The preview is still starting.</strong>
          <span>If the editor preview gets stuck, refresh it here or open the live app while the preview reconnects.</span>
          <div class="loader-actions">
            <button type="button" onclick="window.location.reload()">Refresh preview</button>
            <a href="https://unityhearts.app/" target="_blank" rel="noopener noreferrer">Open app</a>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.setTimeout(function () {
        var loader = document.getElementById("initial-loader");
        if (loader) loader.classList.add("loader-stalled");
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
